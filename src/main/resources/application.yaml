spring:
  application:
    name: WebTest

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  datasource:
    url: jdbc:h2:file:./data/test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  devtools:
    livereload:
      port: 35729
      enabled: true