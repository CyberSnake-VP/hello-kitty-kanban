<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Registration</title>
    <link rel="stylesheet" href="/css/public/authorization/authorization-page.css">
</head>
<body>
<div class="page-wrapper">
    <div class="container">
        <div class="header-container">
            <h2 class="header-container__text">Registration</h2>
        </div>
        <div class="form-container">
            <form action="/registration" method="post" class="form-container__form">
                <div class="form-container__input-wrapper">
                    <input type="text" name="name" placeholder="Enter your name" class="form-container__input"
                           required>
                </div>
                <div class="form-container__input-wrapper">
                    <input type="email" name="email" placeholder="Enter your email" class="form-container__input"
                           required>
                </div>
                <div class="form-container__input-wrapper">
                    <input type="password" name="password" placeholder="Enter your password"
                           class="form-container__input" required>
                </div>
                <div class="form-container__button-wrapper">
                    <button type="submit" class="form-container__button">Sign up</button>
                </div>
            </form>
        </div>
        <div class="footer-link-container">
            <span class="footer-link-container__text">
                Already have an account?
                <a href="/login" class="footer-link-container__link">
                    Log in
                </a>
            </span>
        </div>
    </div>
</div>
</body>
</html>
