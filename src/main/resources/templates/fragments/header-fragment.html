<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nata+Sans:wght@100..900&display=swap" rel="stylesheet">
    <title>Header Fragment</title>
</head>
<body>
<div th:fragment="header-fragment (userName)" class="navbar-wrapper">
    <div class="navbar-container">
        <div class="navbar-container__left-menu">
            <div class="navbar-container__controls">
                <a href="/" class="navbar-container__controls-link">Home</a>
            </div>
            <div class="navbar-container__controls">
                <a href="/account" class="navbar-container__controls-link">Account</a>
            </div>
            <div sec:authorize="hasRole('ROLE_ADMIN') or hasRole('ROLE_SUPER_ADMIN')" class="navbar-container__controls">
                <a href="/admin" class="navbar-container__controls-link">Management</a>
            </div>
        </div>
        <div class="navbar-container__right-menu">
            <div class="navbar-container__controls">
                <span class="navbar-container__controls-text">(User: [[${userName}]])</span>
                <a href="/logout" class="navbar-container__controls-link">Logout</a>
            </div>
            <div class="navbar-container__controls">
                <a href="/session-info" class="navbar-container__controls-link">Profile</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
